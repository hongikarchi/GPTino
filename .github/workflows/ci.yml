name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-stage:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ui/panel/package-lock.json
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.422
      - name: Check patch whitespace
        run: git diff --check HEAD^ HEAD
      - name: Build panel, validate .NET, and stage one package
        shell: pwsh
        run: ./scripts/build-package.ps1
      - name: Upload validated Yak staging archive
        uses: actions/upload-artifact@v4
        with:
          name: GPTino-yak-stage
          path: |
            artifacts/GPTino-*-yak-stage.zip
            artifacts/GPTino-*-yak-stage-contents.txt
          if-no-files-found: error
          retention-days: 7
